# ============================================================
# FlowAI Studio - CI Pipeline
# ============================================================
# 触发条件: push/PR to main
# 流程: lint → type-check → test → build
#
# 竞品对标:
# - Dify: GitHub Actions (lint + test + build + docker)
# - n8n: GitHub Actions (lint + type-check + test)
# - FastGPT: GitHub Actions (build + docker)
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # 后端检查
  # ============================================================
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowai-studio-backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flowai_studio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: flowai-studio-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowai_studio_test?schema=public
        run: npx prisma migrate deploy || echo "Migration skipped (may need manual setup)"

      - name: Test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowai_studio_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          QWEN_API_KEY: test-api-key
          NODE_ENV: test
        run: npm test --if-present

  # ============================================================
  # 前端检查
  # ============================================================
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowai-studio-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: flowai-studio-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ============================================================
  # Docker 构建验证
  # ============================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t flowai-backend:test ./flowai-studio-backend

      - name: Build frontend image
        run: docker build -t flowai-frontend:test ./flowai-studio-frontend
